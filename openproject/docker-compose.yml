name: openproject

networks:
  frontend:
  backend:

volumes:
  pgdata:
  opdata:

x-op-app: &op-app
  image: openproject/openproject:${TAG:-17-slim}
  restart: unless-stopped
  environment:
    OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS:-false}"
    OPENPROJECT_HOST__NAME: "${OPENPROJECT_HOST__NAME:-localhost:8080}"
    OPENPROJECT_ADDITIONAL__HOST__NAMES: "${OPENPROJECT_ADDITIONAL__HOST__NAMES:-web}"
    OPENPROJECT_HSTS: "${OPENPROJECT_HSTS:-false}"
    OPENPROJECT_RAILS__CACHE__STORE: memcache
    OPENPROJECT_CACHE__MEMCACHE__SERVER: cache:11211
    OPENPROJECT_RAILS__RELATIVE__URL__ROOT: "${OPENPROJECT_RAILS__RELATIVE__URL__ROOT:-}"
    OPENPROJECT_COLLABORATIVE__EDITING__HOCUSPOCUS__URL: "${COLLABORATIVE_SERVER_URL:-ws://localhost:8080/hocuspocus}"
    OPENPROJECT_COLLABORATIVE__EDITING__HOCUSPOCUS__SECRET: "${COLLABORATIVE_SERVER_SECRET:?Set COLLABORATIVE_SERVER_SECRET in .env}"
    DATABASE_URL: "${DATABASE_URL:-postgres://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db/openproject?pool=20&encoding=unicode&reconnect=true}"
    RAILS_MIN_THREADS: "${RAILS_MIN_THREADS:-4}"
    RAILS_MAX_THREADS: "${RAILS_MAX_THREADS:-16}"
    IMAP_ENABLED: "${IMAP_ENABLED:-false}"
    SECRET_KEY_BASE: "${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}"
  volumes:
    - "${OPDATA:-opdata}:/var/openproject/assets"

services:
  db:
    image: postgres:${POSTGRES_VERSION:-17}
    restart: unless-stopped
    stop_grace_period: 3s
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - "${PGDATA:-pgdata}:/var/lib/postgresql/data"
    networks:
      - backend

  cache:
    image: memcached:1.6-alpine
    restart: unless-stopped
    networks:
      - backend

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${PORT:-127.0.0.1:8080}:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - hocuspocus
    networks:
      - frontend

  web:
    <<: *op-app
    command: ./docker/prod/web
    depends_on:
      - db
      - cache
      - seeder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080${OPENPROJECT_RAILS__RELATIVE__URL__ROOT:-}/health_checks/default"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - frontend
      - backend

  worker:
    <<: *op-app
    command: ./docker/prod/worker
    depends_on:
      - db
      - cache
      - seeder
    networks:
      - backend

  cron:
    <<: *op-app
    command: ./docker/prod/cron
    depends_on:
      - db
      - cache
      - seeder
    networks:
      - backend

  seeder:
    <<: *op-app
    command: ./docker/prod/seeder
    restart: on-failure
    depends_on:
      - db
      - cache
    networks:
      - backend

  hocuspocus:
    image: openproject/hocuspocus:${HOCUSPOCUS_TAG:-17.3.1}
    restart: unless-stopped
    environment:
      SECRET: "${COLLABORATIVE_SERVER_SECRET:?Set COLLABORATIVE_SERVER_SECRET in .env}"
      OPENPROJECT_URL: "${OPENPROJECT_URL:-http://web:8080}"
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS:-false}"
    networks:
      - frontend
      - backend
